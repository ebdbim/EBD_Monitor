<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EBD Road Project — Construction & Financial Monitor v3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0b0f17; --bg2:#131a28; --bg3:#1a2233; --panel:#141b2d;
  --line:#252f45; --text:#e5e9f0; --text2:#9aa4b8; --text3:#5c6782;
  --blue:#4da3ff; --green:#22c55e; --yellow:#facc15; --orange:#fb923c;
  --red:#ef4444; --purple:#a78bfa; --teal:#14b8a6; --pink:#ec4899;
  --badge-A:#7c3aed; --badge-B:#0ea5e9; --badge-C:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select{font-family:inherit;outline:none}

/* === LOGIN === */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0b0f17 0%,#131a28 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.login-logo{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px;color:var(--blue)}
.login-sub{text-align:center;color:var(--text2);font-size:11px;margin-bottom:28px}
.login-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.login-select,.login-pin-input{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--text);margin-bottom:16px;font-size:13px}
.login-btn{width:100%;padding:12px;background:var(--blue);color:white;border-radius:6px;font-weight:600;font-size:14px;margin-top:8px}
.login-btn:hover{background:#3d8eea}
.login-error{color:var(--red);font-size:11px;text-align:center;margin-top:8px;min-height:14px}
.login-hint{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);color:var(--text3);font-size:10px;text-align:center;line-height:1.5}

/* === LAYOUT === */
.main-layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:18px 16px;border-bottom:1px solid var(--line)}
.sidebar-title{font-weight:700;color:var(--blue);font-size:14px}
.sidebar-sub{font-size:10px;color:var(--text3);margin-top:2px}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--text2);font-size:13px;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--blue);border-left-color:var(--blue)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-cat{padding:14px 16px 6px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.admin-only{opacity:.6}
.admin-only.visible{opacity:1}
.content-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:12px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:var(--bg2)}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-weight:700;font-size:14px}
.topbar-section{font-size:11px;color:var(--text2)}
.user-badge{display:flex;align-items:center;gap:8px;font-size:12px}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.logout-btn{padding:6px 12px;background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:4px;font-size:11px}
.logout-btn:hover{background:var(--red);border-color:var(--red)}
.content{flex:1;padding:20px 24px;overflow-y:auto}

/* === PANELS === */
.section-header{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}
.panel-title{font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);color:var(--text);display:flex;justify-content:space-between;align-items:center}
.panel-subtitle{font-size:10px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0}

/* === KPIs === */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--blue)}
.kpi-card.kpi-red::before{background:var(--red)}
.kpi-card.kpi-yellow::before{background:var(--yellow)}
.kpi-card.kpi-green::before{background:var(--green)}
.kpi-card.kpi-orange::before{background:var(--orange)}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);line-height:1.1}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:3px}

/* === CHARTS === */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:12px;margin-bottom:12px}
.chart-panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;position:relative;min-height:280px}
.chart-panel.tall{min-height:360px}
.chart-title{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text)}
.chart-panel canvas{max-height:260px}
.chart-panel.tall canvas{max-height:320px}

/* === TABLES === */
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{background:var(--bg3);color:var(--text2);padding:8px 10px;text-align:left;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.04em;border-bottom:1px solid var(--line)}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--line);color:var(--text)}
.data-table tr:hover td{background:var(--bg3)}
.data-table tr.sub td{background:var(--bg);font-weight:600;color:var(--text3)}

/* === BADGES === */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-A{background:var(--badge-A);color:white}
.badge-B{background:var(--badge-B);color:white}
.badge-C{background:var(--badge-C);color:white}
.badge-LHS{background:#7c3aed33;color:#a78bfa;border:1px solid #7c3aed55}
.badge-RHS{background:#14b8a633;color:#5eead4;border:1px solid #14b8a655}
.badge-ok{background:#22c55e22;color:#86efac;border:1px solid #22c55e66}
.badge-warn{background:#fb923c22;color:#fdba74;border:1px solid #fb923c66}
.badge-danger{background:#ef444422;color:#fca5a5;border:1px solid #ef444466}
.badge-info{background:#4da3ff22;color:#93c5fd;border:1px solid #4da3ff66}

/* === PROGRESS BARS === */
.progress-item{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--text2)}
.progress-track{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
.progress-fill{height:100%;background:var(--blue);border-radius:5px;transition:width .4s}
.progress-double{display:flex;gap:6px;align-items:center;margin-bottom:3px}

/* === SEQUENCE MAP === */
.seq-container{display:flex;flex-direction:column;gap:3px;margin-top:10px}
.seq-row{display:flex;align-items:center;gap:10px}
.seq-label{width:110px;font-size:10px;color:var(--text2);text-align:right;flex-shrink:0}
.seq-track{flex:1;height:16px;background:var(--bg);border-radius:3px;position:relative;border:1px solid var(--line)}
.seq-segment{position:absolute;top:0;bottom:0;opacity:.85;border-radius:2px}
.seq-segment:hover{opacity:1;outline:1px solid white}

/* === FILTERS === */
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-select,.filter-input{padding:6px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:5px;color:var(--text);font-size:12px}

/* === ALERTS === */
.alert-box{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--red);border-radius:6px;padding:12px 14px;margin-bottom:10px;display:flex;gap:10px}
.alert-box.alert-yellow{border-left-color:var(--yellow)}
.alert-box.alert-red{border-left-color:var(--red)}
.alert-box.alert-orange{border-left-color:var(--orange)}
.alert-title{font-weight:600;margin-bottom:4px;color:var(--text)}
.alert-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* === FORMS === */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group label{display:block;font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.06em;margin-bottom:4px;font-weight:600}
.form-input{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:5px;color:var(--text);font-size:12px}
.btn{padding:8px 16px;border-radius:5px;font-weight:600;font-size:12px;transition:all .15s}
.btn-primary{background:var(--blue);color:white}
.btn-primary:hover{background:#3d8eea}
.btn-danger{background:var(--red);color:white;padding:4px 10px;font-size:10px}
.btn-danger:hover{background:#dc2626}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--line)}
.btn-secondary:hover{background:var(--line)}
.btn-ok{background:var(--green);color:white}

/* === UPLOAD ZONE === */
.upload-zone{border:2px dashed var(--line);border-radius:8px;padding:30px;text-align:center;background:var(--bg2);transition:all .2s;cursor:pointer}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:var(--bg3)}
.upload-zone .up-icon{font-size:36px;margin-bottom:8px}
.upload-zone .up-title{font-weight:600;margin-bottom:4px}
.upload-zone .up-desc{font-size:11px;color:var(--text2)}
.file-list{margin-top:12px}
.file-item{display:flex;justify-content:space-between;padding:8px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:4px;margin-bottom:6px;font-size:11px}
.file-status{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.file-status.ok{background:#22c55e22;color:#86efac}
.file-status.err{background:#ef444422;color:#fca5a5}
.file-status.proc{background:#facc1522;color:#fde68a}

/* === TOAST === */
#toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--green);border-radius:6px;transform:translateX(400px);transition:transform .3s;z-index:999;font-size:12px;max-width:380px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
#toast.show{transform:translateX(0)}
#toast.err{border-left-color:var(--red)}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* === UTILITIES === */
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-right:4px}
.num{font-variant-numeric:tabular-nums;text-align:right}
.mono{font-family:'SF Mono','Consolas','Courier New',monospace}
.dim{color:var(--text3)}
.critical{color:var(--red);font-weight:600}
.warning{color:var(--orange);font-weight:600}
.ok{color:var(--green);font-weight:600}

/* === RECONCILIATION PANEL === */
.recon-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px}
.recon-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.recon-bar{height:12px;background:var(--bg2);border-radius:3px;position:relative;overflow:hidden}
.recon-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px}
.recon-badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;min-width:80px;text-align:center}
.diff-plus{color:var(--red);background:#ef444422;border:1px solid #ef444466}
.diff-neg{color:var(--green);background:#22c55e22;border:1px solid #22c55e66}
.diff-small{color:var(--text2);background:var(--bg2);border:1px solid var(--line)}

@media (max-width:900px){
  .sidebar{width:180px}
  .chart-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

function unionLen(ivs){
  if (!ivs.length) return 0;
  const sorted = ivs.map(([a,b])=>[Math.min(a,b), Math.max(a,b)]).sort((x,y)=>x[0]-y[0]);
  let merged = [[...sorted[0]]];
  for (let i=1; i<sorted.length; i++){
    const [s,f] = sorted[i];
    if (s <= merged[merged.length-1][1]) merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], f);
    else merged.push([s,f]);
  }
  return merged.reduce((s,[a,b])=>s+(b-a), 0);
}
function intersectLen(aIvs, bIvs){
  function normalize(ivs){
    const s = ivs.filter(([a,b])=>a!=null&&b!=null).map(([a,b])=>[Math.min(a,b),Math.max(a,b)]).sort((x,y)=>x[0]-y[0]);
    if (!s.length) return [];
    let m = [[...s[0]]];
    for (let i=1; i<s.length; i++){
      const [a,b] = s[i];
      if (a <= m[m.length-1][1]) m[m.length-1][1] = Math.max(m[m.length-1][1], b);
      else m.push([a,b]);
    }
    return m;
  }
  const A = normalize(aIvs), B = normalize(bIvs);
  let t = 0;
  for (const [a0,a1] of A) for (const [b0,b1] of B) t += Math.max(0, Math.min(a1,b1)-Math.max(a0,b0));
  return t;
}
function sectionOfChainage(st){
  if (st==null) return null;
  for (const [sec, [lo,hi]] of Object.entries(SEC_BOUNDS)) if (st>=lo && st<hi) return sec;
  return null;
}
function fmtCh(v){
  if (v==null) return '—';
  const km = Math.floor(v/1000);
  const m = Math.round(v - km*1000);
  return `K${km}+${String(m).padStart(3,'0')}`;
}
function fmtUSD(v){
  if (v==null || isNaN(v)) return '—';
  const sign = v<0 ? '-' : '';
  const av = Math.abs(v);
  if (av>=1e6) return sign+'$'+(av/1e6).toFixed(2)+'M';
  if (av>=1e3) return sign+'$'+(av/1e3).toFixed(1)+'K';
  return sign+'$'+av.toFixed(0);
}
function fmtNum(v){
  if (v==null || isNaN(v)) return '—';
  return Math.round(v).toLocaleString();
}
function fmtPct(v){ return v==null || isNaN(v) ? '—' : v.toFixed(1)+'%'; }

/* ============================================================
   ANALYSIS FUNCTIONS
   ============================================================ */
function totalMWeekly(task, sec, side){
  return DB_WEEKLY.filter(r=>r.task===task && r.section===sec && r.side===side).reduce((s,r)=>s+(r.length||0), 0);
}
function netMWeekly(task, sec, side){
  const recs = DB_WEEKLY.filter(r=>r.task===task && r.section===sec && r.side===side && r.start!=null);
  return unionLen(recs.map(r=>[r.start,r.finish]));
}
function netMIpc(item, sec, side){
  const recs = DB_IPC.filter(r=>r.item===item && r.side===side && sectionOfChainage(r.start)===sec && r.start!=null);
  return unionLen(recs.map(r=>[r.start,r.finish]));
}
function netMIpcTotal(item, side){
  const recs = DB_IPC.filter(r=>r.item===item && r.side===side && r.start!=null);
  return unionLen(recs.map(r=>[r.start,r.finish]));
}

function computeReconciliation(){
  const rows = [];
  let totalDeltaM = 0, totalDeltaUSD = 0;
  for (const [wkName, ipcName] of Object.entries(TASK_EQ)){
    for (const side of ['LHS','RHS']){
      const wkRecs = DB_WEEKLY.filter(r=>r.task===wkName && r.side===side);
      const wkBruto = wkRecs.reduce((s,r)=>s+(r.length||0), 0);
      const wkNeto = unionLen(wkRecs.filter(r=>r.start!=null).map(r=>[r.start,r.finish]));
      // IPC: solo IPCs 10,11,12 (ventana temporal ~ weekly)
      const ipcRecs = DB_IPC.filter(r=>r.item===ipcName && r.side===side && [10,11,12].includes(r.ipc));
      const ipcBruto = ipcRecs.reduce((s,r)=>s+r.dist, 0);
      const ipcNeto = unionLen(ipcRecs.filter(r=>r.start!=null).map(r=>[r.start,r.finish]));
      const gap = ipcNeto - wkNeto;
      const usd = gap * RATES[ipcName];
      const ratio = wkNeto>0 ? ipcNeto/wkNeto : null;
      totalDeltaM += gap;
      totalDeltaUSD += usd;
      rows.push({task: wkName, ipc: ipcName, side, wkBruto, wkNeto, ipcBruto, ipcNeto, gap, usd, ratio});
    }
  }
  return {rows, totalDeltaM, totalDeltaUSD};
}

function computeSpatialOverlap(){
  const rows = [];
  for (const [wkName, ipcName] of Object.entries(TASK_EQ)){
    for (const side of ['LHS','RHS']){
      const wkIvs = DB_WEEKLY.filter(r=>r.task===wkName && r.side===side && r.start!=null).map(r=>[r.start,r.finish]);
      const ipcIvs = DB_IPC.filter(r=>r.item===ipcName && r.side===side && [10,11,12].includes(r.ipc) && r.start!=null).map(r=>[r.start,r.finish]);
      const wkLen = unionLen(wkIvs);
      const ipcLen = unionLen(ipcIvs);
      const both = intersectLen(wkIvs, ipcIvs);
      const onlyWR = wkLen - both;
      const onlyIPC = ipcLen - both;
      const union = wkLen + ipcLen - both;
      const jaccard = union>0 ? both/union : 0;
      rows.push({task: wkName, ipc: ipcName, side, onlyWR, onlyIPC, both, union, jaccard});
    }
  }
  return rows;
}

function computeAnomaliesAll(){
  const anoms = [];
  // Gaps & overlaps on WR
  for (const task of TASK_WEEKLY){
    for (const sec of ['A','B','C']){
      for (const side of ['LHS','RHS']){
        const recs = DB_WEEKLY.filter(r=>r.task===task && r.section===sec && r.side===side && r.start!=null).sort((a,b)=>a.start-b.start);
        if (recs.length<2) continue;
        for (let i=1; i<recs.length; i++){
          const prev = recs[i-1], curr = recs[i];
          const prevEnd = Math.max(prev.start, prev.finish);
          const currStart = Math.min(curr.start, curr.finish);
          if (currStart > prevEnd){
            const gap = currStart - prevEnd;
            if (gap > 200) anoms.push({
              type:'GAP', task, sec, side,
              detail:`${fmtCh(prevEnd)} → ${fmtCh(currStart)}`,
              size: gap,
              sev: gap>1000?'red':'yellow',
            });
          } else if (currStart < prevEnd){
            const ov = prevEnd - currStart;
            if (ov > 50) anoms.push({
              type:'OVERLAP', task, sec, side,
              detail:`${fmtCh(currStart)} ↔ ${fmtCh(prevEnd)}`,
              size: ov,
              sev: ov>300?'red':'yellow',
            });
          }
        }
      }
    }
  }
  anoms.sort((a,b)=>b.size - a.size);
  return anoms;
}

function computeSequenceViolations(){
  // Secuencia ideal: Excavation → Subgrade → CBR40 → CBR100 → SP25 → SP19
  const seq = [['Subgrade/White Sand','Excavation'], ['CBR40','Subgrade/White Sand'],
               ['CBR100','CBR40'], ['SP25','CBR100'], ['SP19','SP25']];
  const violations = [];
  for (const [upper, lower] of seq){
    for (const r of DB_WEEKLY.filter(x=>x.task===upper && x.length)){
      const iv = [Math.min(r.start,r.finish), Math.max(r.start,r.finish)];
      const candidates = DB_WEEKLY.filter(x=>x.task===lower && x.section===r.section && x.side===r.side && x.start!=null);
      let baseFound = null;
      let laterBase = null;
      for (const c of candidates){
        const civ = [Math.min(c.start,c.finish), Math.max(c.start,c.finish)];
        if (Math.max(iv[0],civ[0]) < Math.min(iv[1],civ[1])){
          const cd = new Date(c.date), rd = new Date(r.date);
          if (cd <= rd) { if (!baseFound || new Date(baseFound.date)<cd) baseFound = c; }
          else { if (!laterBase || new Date(laterBase.date)>cd) laterBase = c; }
        }
      }
      if (!baseFound && laterBase){
        violations.push({type:'ORDER', upper, lower, section:r.section, side:r.side, 
                         ch:fmtCh(iv[0]), dateUpper:r.date, dateLower:laterBase.date,
                         severity:'red'});
      } else if (!baseFound && !laterBase){
        violations.push({type:'MISSING BASE', upper, lower, section:r.section, side:r.side,
                         ch:fmtCh(iv[0]), dateUpper:r.date, dateLower:null,
                         severity:'yellow'});
      }
    }
  }
  return violations;
}

function computeDuplication(){
  const rows = [];
  for (const task of TASK_WEEKLY){
    for (const sec of ['A','B','C']){
      for (const side of ['LHS','RHS']){
        const recs = DB_WEEKLY.filter(r=>r.task===task && r.section===sec && r.side===side && r.start!=null);
        if (!recs.length) continue;
        const bruto = recs.reduce((s,r)=>s+(r.length||0), 0);
        const neto = unionLen(recs.map(r=>[r.start,r.finish]));
        const dup = bruto - neto;
        if (dup > 0) rows.push({task, sec, side, bruto, neto, dup, pct: dup/bruto*100});
      }
    }
  }
  rows.sort((a,b)=>b.dup - a.dup);
  return rows;
}

function computeProjection(){
  // Por task, sec, side: tasa actual y proyección
  const today = new Date('2026-03-17');
  const contractEnd = new Date('2027-04-01');
  const rows = [];
  for (const task of TASK_WEEKLY){
    for (const sec of ['A','B','C']){
      for (const side of ['LHS','RHS']){
        const recs = DB_WEEKLY.filter(r=>r.task===task && r.section===sec && r.side===side && r.start!=null && r.date);
        if (!recs.length) continue;
        const neto = unionLen(recs.map(r=>[r.start,r.finish]));
        const target = SEC_LEN[sec];
        const missing = target - neto;
        const dates = recs.map(r=>new Date(r.date)).sort((a,b)=>a-b);
        const span = Math.max(1, (dates[dates.length-1] - dates[0])/(1000*60*60*24) + 1);
        const rate = neto/span;
        let projEnd=null, daysNeeded=null, status='';
        if (missing <= 0){ status='completed'; }
        else if (rate > 0){
          daysNeeded = missing/rate;
          projEnd = new Date(today.getTime() + daysNeeded*24*60*60*1000);
          status = projEnd > contractEnd ? 'late' : 'ok';
        } else { status='stalled'; }
        rows.push({task, sec, side, neto, target, missing, rate, daysNeeded, projEnd, status});
      }
    }
  }
  return rows;
}

function pageProgress(){

  for (const sec of ['A','B','C']){
    html += `<div class="panel"><div class="panel-title">Section ${sec} — ${SEC_LEN[sec].toLocaleString()} m total</div>`;
    for (const task of TASK_WEEKLY){
      const lhs = totalMWeekly(task, sec, 'LHS');
      const rhs = totalMWeekly(task, sec, 'RHS');
      const lhsN = netMWeekly(task, sec, 'LHS');
      const rhsN = netMWeekly(task, sec, 'RHS');
      const tot = lhs + rhs;
      if (tot === 0){
        html += `<div class="progress-item"><div class="progress-label"><span>${task}</span><span class="critical">No records</span></div><div class="progress-track"><div class="progress-fill" style="width:0%;background:var(--red)"></div></div></div>`;

      }
      const covL = Math.min(100, lhsN/SEC_LEN[sec]*100);
      const covR = Math.min(100, rhsN/SEC_LEN[sec]*100);
      const dupL = lhs-lhsN;
      const dupR = rhs-rhsN;
      const color = TASK_COLORS[task] || '#666';
      html += `<div class="progress-item">
        <div class="progress-label">
          <span><strong>${task}</strong></span>
          <span>LHS: ${fmtNum(lhsN)}m (${covL.toFixed(1)}%) ${dupL>0?`<span class="dim">+${fmtNum(dupL)}m dup</span>`:''} &nbsp; | &nbsp; RHS: ${fmtNum(rhsN)}m (${covR.toFixed(1)}%) ${dupR>0?`<span class="dim">+${fmtNum(dupR)}m dup</span>`:''}</span>

        <div class="progress-double">
          <span style="font-size:10px;color:var(--purple);width:28px">LHS</span>

        </div>

function renderSeqMap(){
  const source = document.getElementById('sm-source')?.value || 'WR';
  const secFilter = document.getElementById('sm-sec')?.value || '';
  const secs = secFilter ? [secFilter] : ['A','B','C'];
  let html = '';
  for (const sec of secs){
    const [lo, hi] = SEC_BOUNDS[sec];
    const secLen = hi - lo;
    html += `<div class="panel"><div class="panel-title">Section ${sec} — ${fmtCh(lo)} → ${fmtCh(hi)} (${secLen.toLocaleString()} m)</div>`;
    const tasks = source==='IPC' ? IPC_ITEMS : TASK_WEEKLY;
    for (const task of tasks){
      for (const side of ['LHS','RHS']){
        let segs = [];
        if (source==='WR' || source==='BOTH'){
          const recs = DB_WEEKLY.filter(r=>r.task===task && r.section===sec && r.side===side && r.start!=null);
          recs.forEach(r=>segs.push({s:Math.min(r.start,r.finish), f:Math.max(r.start,r.finish), type:'WR'}));
        }
        if (source==='IPC' || source==='BOTH'){
          const ipcName = TASK_EQ[task] || task;
          const recs = DB_IPC.filter(r=>r.item===ipcName && r.side===side && r.start!=null && sectionOfChainage(r.start)===sec);
          recs.forEach(r=>segs.push({s:Math.min(r.start,r.finish), f:Math.max(r.start,r.finish), type:'IPC'}));
        }
        if (!segs.length) continue;
        const color = TASK_COLORS[task] || '#666';
        html += `<div class="seq-row">
          <div class="seq-label">${task} <span class="tag" style="font-size:8px">${side}</span></div>
          <div class="seq-track">
            ${segs.map(s=>{
              const left = (s.s-lo)/secLen*100;
              const width = (s.f-s.s)/secLen*100;
              const bg = s.type==='WR'? color : (color+'88');
              const border = s.type==='IPC'?'border:1px dashed #fff;':'';
              return `<div class="seq-segment" style="left:${left}%;width:${Math.max(width,0.2)}%;background:${bg};${border}" title="${task} ${side} ${s.type}: ${fmtCh(s.s)}-${fmtCh(s.f)}"></div>`;
            }).join('')}
          </div>
        </div>`;
      }
    }
    html += `</div>`;
  }
  document.getElementById('sm-content').innerHTML = html;
}

function parseChainage(s){
  if (s==null) return null;
  s = String(s).trim().replace(/\s/g,'').replace(/\xa0/g,'').toUpperCase().replace('K+','+').replace('K','');
  if (s.includes('+')){
    const [p, q] = s.split('+');
    const pn = parseInt(p, 10), qn = parseFloat(q);
    if (!isNaN(pn) && !isNaN(qn)) return pn*1000 + qn;
    return null;
  }
  const v = parseFloat(s);
  if (isNaN(v)) return null;
  return v < 100 ? v*1000 : v;
}

function parseSide(s){
  if (!s) return null;
  s = String(s).toUpperCase().replace(/\s/g,'');
  if (s.includes('LHS') || s.startsWith('L,') || s==='L') return 'LHS';
  if (s.includes('RHS') || s.startsWith('R,') || s==='R') return 'RHS';
  return null;
}

async function handleUploadWeekly(ev){
  const file = ev.target.files[0];
  if (!file) return;
  const statusId = 'fs-weekly-'+Date.now();
  const list = document.getElementById('up-weekly-list');
  list.innerHTML += `<div class="file-item" id="${statusId}"><span>${file.name}</span><span class="file-status proc">Processing...</span></div>`;
  try {
    const rows = await parseFile(file);
    // Detectar índices de columnas
    const headers = rows[0]?.map(h => String(h||'').toLowerCase().trim());
    let idx = {};
    headers?.forEach((h,i)=>{
      if (h.includes('no')) idx.no = i;
      if (h.includes('side') && !h.includes('road')) idx.side = i;
      if (h.includes('task')) idx.task = i;
      if (h.includes('section')) idx.section = i;
      if (h.includes('date')) idx.date = i;
      if (h.includes('start')) idx.start = i;
      if (h.includes('finish')) idx.finish = i;
      if (h.includes('length')) idx.length = i;
    });
    let added = 0;
    for (let i=1; i<rows.length; i++){
      const r = rows[i];
      if (!r[idx.task]) continue;
      const rec = {
        no: parseInt(r[idx.no]) || (WEEKLY_DATA.length + EXTRA_WEEKLY.length + added + 1),
        side: parseSide(r[idx.side]),
        task: String(r[idx.task]).trim(),
        section: String(r[idx.section]||'').trim().toUpperCase(),
        date: r[idx.date] ? (typeof r[idx.date]==='string' ? r[idx.date].slice(0,10) : new Date(r[idx.date]).toISOString().slice(0,10)) : null,
        start: parseChainage(r[idx.start]),
        finish: parseChainage(r[idx.finish]),
        length: parseFloat(r[idx.length]) || null,
      };
      if (rec.task && rec.side && rec.section && rec.start != null) {
        EXTRA_WEEKLY.push(rec);
        added++;
      }
    }
    rebuildDB();
    document.getElementById(statusId).innerHTML = `<span>${file.name}</span><span class="file-status ok">✓ ${added} rows imported</span>`;
    showToast(`Imported ${added} Weekly records`);
  } catch(e) {
    document.getElementById(statusId).innerHTML = `<span>${file.name}</span><span class="file-status err">✗ ${e.message}</span>`;
    showToast('Import error: '+e.message, true);
  }
}

async function handleUploadIPC(ev){
  const file = ev.target.files[0];
  if (!file) return;
  const statusId = 'fs-ipc-'+Date.now();
  const list = document.getElementById('up-ipc-list');
  list.innerHTML += `<div class="file-item" id="${statusId}"><span>${file.name}</span><span class="file-status proc">Processing...</span></div>`;
  try {
    // For Excel: try multiple sheets to find Road Measurement Sheet
    const rows = await parseFile(file, 'Road Measurement Sheet');
    // IPC structure: rows with RFI, Date, From, To, Distance, Side, IPC
    let added = 0;
    let currentItem = null;
    for (let i=0; i<rows.length; i++){
      const r = rows[i];
      if (!r) continue;
      const a = String(r[0]||'').trim();
      const b = String(r[1]||'').trim();
      if (a.toLowerCase().includes('item no') && b){
        // Item header
        if (b.toLowerCase().includes('cbr40') || b.toLowerCase().includes('sub-base 2')) currentItem = 'CBR40';
        else if (b.toLowerCase().includes('cbr100') || b.toLowerCase().includes('base and sub-bases')) currentItem = 'CBR100';
        else if (b.toLowerCase().includes('geogrid') || b.toLowerCase().includes('ac25') || b.toLowerCase().includes('ac-25')) currentItem = 'AC25';
        else if (b.toLowerCase().includes('ac19') || b.toLowerCase().includes('ac-19')) currentItem = 'AC19';
        continue;
      }
      const dist = parseFloat(r[5]);
      if (isNaN(dist) || dist <= 0) continue;
      const start = parseChainage(r[3]);
      const finish = parseChainage(r[4]);
      if (start == null) continue;
      const side = parseSide(r[6]);
      if (!side) continue;
      let date = r[2] ? (typeof r[2]==='string' ? (r[2].match(/\d{8}/) ? formatDate8(r[2].match(/\d{8}/)[0]) : r[2].slice(0,10)) : new Date(r[2]).toISOString().slice(0,10)) : null;
      const ipcNum = parseInt(r[7]) || null;
      EXTRA_IPC.push({
        item: currentItem || 'UNKNOWN',
        rfi: String(r[1]||'').slice(0,40),
        date, start, finish, dist, side, ipc: ipcNum, row_num: i
      });
      added++;
    }
    rebuildDB();
    document.getElementById(statusId).innerHTML = `<span>${file.name}</span><span class="file-status ok">✓ ${added} rows imported</span>`;
    showToast(`Imported ${added} IPC records`);
  } catch(e) {
    document.getElementById(statusId).innerHTML = `<span>${file.name}</span><span class="file-status err">✗ ${e.message}</span>`;
    showToast('Import error: '+e.message, true);
  }
}

function formatDate8(s){
  return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8);
}

async function parseFile(file, preferredSheet){
  const name = file.name.toLowerCase();
  if (name.endsWith('.csv')) return parseCSV(await file.text());
  // Excel: use SheetJS via dynamic load if needed
  if (!window.XLSX){
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload = res;
      s.onerror = () => rej(new Error('Failed to load XLSX library'));
      document.head.appendChild(s);
    });
  }
  const buf = await file.arrayBuffer();
  const wb = window.XLSX.read(buf, {type:'array'});
  let sheetName = preferredSheet && wb.SheetNames.includes(preferredSheet) ? preferredSheet : wb.SheetNames[0];
  // Si preferred no existe pero hay algo similar:
  if (preferredSheet && !wb.SheetNames.includes(preferredSheet)){
    const candidate = wb.SheetNames.find(n => n.toLowerCase().includes('measurement'));
    if (candidate) sheetName = candidate;
  }
  const ws = wb.Sheets[sheetName];
  return window.XLSX.utils.sheet_to_json(ws, {header:1, raw:true, dateNF:'yyyy-mm-dd'});
}

function parseCSV(text){
  const lines = text.split(/\r?\n/);
  return lines.map(l => l.split(',').map(c => c.trim().replace(/^"(.*)"$/,'$1')));
}

    pv.innerHTML = `Length: <strong>${Math.abs(f-s).toFixed(0)}m</strong>  ·  ${fmtCh(Math.min(s,f))} → ${fmtCh(Math.max(s,f))}`;

function addRecordWR(){
  const rec = {
    no: WEEKLY_DATA.length + EXTRA_WEEKLY.length + 1,
    side: document.getElementById('ad-side').value,
    task: document.getElementById('ad-task').value,
    section: document.getElementById('ad-sec').value,

  updatePreview();
}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

/* ============================================================
   CHART INITIALIZERS
   ============================================================ */
const CHART_OPTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color: '#e5e9f0', font: {size: 11} } },
    tooltip: { backgroundColor: '#141b2d', borderColor: '#252f45', borderWidth: 1 }
  },
  scales: {
    x: { ticks: { color: '#9aa4b8', font: {size: 10} }, grid: { color: '#1a2233' } },
    y: { ticks: { color: '#9aa4b8', font: {size: 10} }, grid: { color: '#1a2233' } }
  }
};

function initCharts(page){
  if (page === 'dashboard') initDashboardCharts();
  else if (page === 'financial') initFinancialCharts();
  else if (page === 'reconcile') initReconcileCharts();
}

function initDashboardCharts(){
  // Physical vs Financial by section
  const el1 = document.getElementById('ch-progress');
  if (el1) {
    charts.progress = new Chart(el1, {
      type: 'bar',
      data: {
        labels: ['Section A', 'Section B', 'Section C', 'Overall'],
        datasets: [
          { label: 'Actual Physical %', data: [META.sections.A.actual, META.sections.B.actual, META.sections.C.actual, META.overall_actual], backgroundColor: '#ef4444' },
          { label: 'Projected %', data: [META.sections.A.projected, META.sections.B.projected, META.sections.C.projected, META.overall_projected], backgroundColor: '#4da3ff' },
        ]
      },
      options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y, max: 100, title: {display:true, text:'%', color:'#9aa4b8'} } } }
    });
  }
  // IPC trend
  const el2 = document.getElementById('ch-ipc-trend');
  if (el2) {
    const labels = GRAND_TOTALS.map((_, i) => 'IPC-' + (i+1));
    charts.ipcTrend = new Chart(el2, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'IPC Billing (USD)',
          data: GRAND_TOTALS,
          borderColor: '#4da3ff',
          backgroundColor: '#4da3ff33',
          fill: true,
          tension: 0.3,
          pointBackgroundColor: '#4da3ff',
          pointRadius: 5
        }]
      },
      options: { ...CHART_OPTS,
        scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y, ticks: { ...CHART_OPTS.scales.y.ticks, callback: v => '$'+(v/1e6).toFixed(1)+'M' } } }
      }
    });
  }
  // Bills execution
  const el3 = document.getElementById('ch-bills');
  if (el3) {
    const items = Object.entries(ITEMS_FIN);
    charts.bills = new Chart(el3, {
      type: 'bar',
      data: {
        labels: items.map(([k]) => 'Item '+k),
        datasets: [{
          label: '% Execution',
          data: items.map(([,v]) => v.todate/v.contract*100),
          backgroundColor: items.map(([,v]) => {
            const p = v.todate/v.contract*100;
            if (p === 0) return '#ef4444';
            if (p < 30) return '#fb923c';
            if (p < 60) return '#facc15';
            if (p < 90) return '#4da3ff';
            return '#22c55e';
          })
        }]
      },
      options: { ...CHART_OPTS, indexAxis: 'y', scales: { ...CHART_OPTS.scales, x: { ...CHART_OPTS.scales.x, max: 100 } } }
    });
  }
  // Jaccard
  const el4 = document.getElementById('ch-jaccard');
  if (el4) {
    const spatial = computeSpatialOverlap();
    charts.jaccard = new Chart(el4, {
      type: 'bar',
      data: {
        labels: spatial.map(r => r.task+' '+r.side),
        datasets: [{
          label: 'Jaccard Overlap %',
          data: spatial.map(r => r.jaccard*100),
          backgroundColor: spatial.map(r => r.jaccard<0.3?'#ef4444':r.jaccard<0.5?'#fb923c':'#facc15')
        }]
      },
      options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y, max: 100, title: {display:true, text:'Jaccard (%)', color:'#9aa4b8'} } } }
    });
  }
}

function initFinancialCharts(){
  // IPC monthly trend
  const el1 = document.getElementById('ch-fin-trend');
  if (el1) {
    charts.finTrend = new Chart(el1, {
      type: 'bar',
      data: {
        labels: GRAND_TOTALS.map((_,i) => 'IPC-'+(i+1)),
        datasets: [{
          label: 'Monthly Billing (USD)',
          data: GRAND_TOTALS,
          backgroundColor: GRAND_TOTALS.map((v,i) => i>=9 && v < GRAND_TOTALS[i-1] ? '#fb923c' : '#4da3ff')
        }]
      },
      options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y, ticks: { ...CHART_OPTS.scales.y.ticks, callback: v => '$'+(v/1e6).toFixed(1)+'M' } } } }
    });
  }
  // Bills %
  const el2 = document.getElementById('ch-fin-bills');
  if (el2) {
    const items = Object.entries(ITEMS_FIN);
    charts.finBills = new Chart(el2, {
      type: 'bar',
      data: {
        labels: items.map(([k,v]) => k+'. '+v.desc.slice(0,20)),
        datasets: [
          { label: 'Certified', data: items.map(([,v]) => v.todate), backgroundColor: '#22c55e' },
          { label: 'Remaining', data: items.map(([,v]) => v.contract - v.todate), backgroundColor: '#1a2233' },
        ]
      },
      options: { ...CHART_OPTS, indexAxis: 'y', scales: { ...CHART_OPTS.scales, x: { ...CHART_OPTS.scales.x, stacked: true, ticks:{...CHART_OPTS.scales.x.ticks, callback: v => '$'+(v/1e6).toFixed(1)+'M'} }, y: {...CHART_OPTS.scales.y, stacked: true} } }
    });
  }
  // Cumulative
  const el3 = document.getElementById('ch-fin-cum');
  if (el3) {
    let cum = 0;
    const cumData = GRAND_TOTALS.map(v => { cum += v; return cum; });
    const contractLine = GRAND_TOTALS.map(() => META.contract_amount);
    const timeLine = GRAND_TOTALS.map((_,i) => META.contract_amount * (i+1) / 12);
    charts.finCum = new Chart(el3, {
      type: 'line',
      data: {
        labels: GRAND_TOTALS.map((_,i) => 'IPC-'+(i+1)),
        datasets: [
          { label: 'Cumulative Billed', data: cumData, borderColor: '#22c55e', backgroundColor: '#22c55e33', fill: true, tension: 0.3, pointRadius: 4 },
          { label: 'Linear Time Target', data: timeLine, borderColor: '#fb923c', borderDash: [5,5], fill: false, pointRadius: 0 },
          { label: 'Contract Total', data: contractLine, borderColor: '#4da3ff', borderDash: [2,2], fill: false, pointRadius: 0 },
        ]
      },
      options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y, ticks: { ...CHART_OPTS.scales.y.ticks, callback: v => '$'+(v/1e6).toFixed(0)+'M' } } } }
    });
  }
  // Stacked by category
  const el4 = document.getElementById('ch-fin-stack');
  if (el4) {
    const labels = GRAND_TOTALS.map((_,i) => 'IPC-'+(i+1));
    const colors = ['#4da3ff','#22c55e','#a78bfa','#14b8a6','#facc15','#ec4899','#fb923c','#ef4444','#06b6d4','#8b5cf6','#f97316','#84cc16'];
    const datasets = Object.entries(ITEMS_FIN)
      .filter(([,v]) => v.evol.some(x => x > 0))
      .slice(0, 8)
      .map(([k,v], i) => ({
        label: k+'. '+v.desc.slice(0,18),
        data: v.evol,
        backgroundColor: colors[i % colors.length]
      }));
    charts.finStack = new Chart(el4, {
      type: 'bar',
      data: { labels, datasets },
      options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales, x: {...CHART_OPTS.scales.x, stacked: true}, y: {...CHART_OPTS.scales.y, stacked: true, ticks: { ...CHART_OPTS.scales.y.ticks, callback: v => '$'+(v/1e6).toFixed(1)+'M' }} } }
    });
  }
}

function initReconcileCharts(){
  const recon = computeReconciliation();
  const spatial = computeSpatialOverlap();
  // Net comparison bars
  const el1 = document.getElementById('ch-recon-bars');
  if (el1) {
    charts.reconBars = new Chart(el1, {
      type: 'bar',
      data: {
        labels: recon.rows.map(r => r.task+' '+r.side),
        datasets: [
          { label: 'Weekly Register (net m)', data: recon.rows.map(r => r.wkNeto), backgroundColor: '#22c55e' },
          { label: 'IPC (net m)', data: recon.rows.map(r => r.ipcNeto), backgroundColor: '#ef4444' },
        ]
      },
      options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y, title: {display:true, text:'Meters', color:'#9aa4b8'} } } }
    });
  }
  // Jaccard
  const el2 = document.getElementById('ch-jaccard-detail');
  if (el2) {
    charts.jaccardDetail = new Chart(el2, {
      type: 'bar',
      data: {
        labels: spatial.map(r => r.task+' '+r.side),
        datasets: [
          { label: 'Only in WR (m)', data: spatial.map(r => r.onlyWR), backgroundColor: '#22c55e' },
          { label: 'In Both (m)', data: spatial.map(r => r.both), backgroundColor: '#4da3ff' },
          { label: 'Only in IPC (m)', data: spatial.map(r => r.onlyIPC), backgroundColor: '#ef4444' },
        ]
      },
      options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales, x: {...CHART_OPTS.scales.x, stacked: true}, y: {...CHART_OPTS.scales.y, stacked: true, title: {display:true, text:'Meters', color:'#9aa4b8'}} } }
    });
  }
}
